name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"   # once a day
  workflow_dispatch: {}     # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions (no auth)
        env:
          GH_PROFILE_USER: j0hn-char
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
